interface:
  display_name: "Skill Maintain"
  short_description: "Repair drift in one existing skill without redefining its role or kernel."
  default_prompt: "Use $skill-maintain to repair drift in one existing skill without redefining its role or kernel. Audit first, establish the role/kernel baseline, run repair expansion, choose the narrowest repair depth, and close out with the default maintenance verdict unless another artifact is requested: drift diagnosis, repair depth, maintenance-vs-redesign judgment, handoff judgment, proof, and residual risk or confidence. Hand off to $skill-architect for role/kernel redefinition, to $skill-referee for ambiguous ownership or handoff between skills, and to $skill-governance-escalation when the local repair is clear but the cause looks reusable upstream. Patch only after a concise plan or explicit implementation request, then validate through the existing bundle and smoke checks. It can still repair portability, language, output-contract, interaction-intensity, bundle, authority, structure, or token-cost drift."
