interface:
  display_name: "Skill Maintain"
  short_description: "Repair drift in one existing skill without redefining its role or kernel."
  default_prompt: "Use $skill-maintain to repair drift in one existing skill without redefining its role or kernel. Audit first, establish the role/kernel baseline, run repair expansion, choose the narrowest repair depth, patch only after a concise plan or explicit implementation request, and validate through the existing bundle and smoke checks. It can still repair portability or language issues, output-contract drift, interaction-intensity drift, bundle mismatches, authority-boundary drift, structural bloat, or token/context cost when those are the concrete drift."
