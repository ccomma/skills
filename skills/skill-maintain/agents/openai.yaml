interface:
  display_name: "Skill Maintain"
  short_description: "Audit, harden, or repair one existing skill with repair expansion and regression checks."
  default_prompt: "Use $skill-maintain to audit, mature, or repair one existing skill for portability or language issues, output-contract drift, interaction-intensity drift, bundle mismatches, authority-boundary drift, structural bloat, or token/context cost; start with a repair expansion pass, choose the narrowest repair mode and repair depth, establish a capability baseline, patch only after a concise plan or explicit implementation request, and validate with regression checks."
