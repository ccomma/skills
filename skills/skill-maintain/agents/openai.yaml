interface:
  display_name: "Skill Maintain"
  short_description: "Repair drift in one existing skill without redefining its role or kernel."
  default_prompt: "Use $skill-maintain to repair drift in one existing skill without redefining its role or kernel. Audit first, establish the role/kernel baseline, choose the narrowest repair depth, and close with the default maintenance verdict: drift diagnosis, repair depth, maintenance-vs-redesign judgment, handoff judgment, proof, and residual risk or confidence. Hand off to $skill-architect for role/kernel redefinition or any repair that would create or redefine architecture surfaces such as validation starter, the default narrow live smoke, its smallest-smoke ladder, or a first companion validation-bearing component. Hand off to $skill-referee for ambiguous ownership, and to $skill-governance-escalation when the local repair is clear but the cause looks reusable upstream. Patch only after a concise plan or explicit implementation request, then validate through the existing bundle and smoke checks."
