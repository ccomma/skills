interface:
  display_name: "Skill Architect"
  short_description: "Lock a skill's kernel and turn it into an initializer-neutral build brief."
  default_prompt: "Use $skill-architect when one skill's boundary is already clear and you need an initializer-neutral build brief first, or when an existing skill change has crossed into architecture surfaces such as kernel lines, validation starter, the default narrow live smoke, its stop or escalate rule, or companion validation-bearing components. Produce the kernel sentence, trigger boundary, first move, strongest thing, wrong-scope sentence, minimal shape, component decisions, do-not-add rules, validation starter, and initializer handoff before deeper structure design."
