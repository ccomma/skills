interface:
  display_name: "Product Plan"
  short_description: "Turn a planning-ready direction into a phase-package-centered planning stack."
  default_prompt: "Use $product-plan when a product direction is already clear enough to become durable planning artifacts centered on the current or next phase package. Treat a Product Brief as upstream input, align `DESIGN.md`, roadmap, phase docs, and `CURRENT_HANDOFF.md`, and keep existing-plan challenge requests with documentation or code contradictions out of this workflow."
