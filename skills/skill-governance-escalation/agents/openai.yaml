interface:
  display_name: "Skill Governance Escalation"
  short_description: "Auto-audit a concrete issue first, then escalate only the findings that warrant reusable upstream repair."
  default_prompt: "Use $skill-governance-escalation when a concrete issue should trigger an explicit governance review. Start with an auto-audit of the current evidence or changed artifacts, produce findings before escalation, separate local-only findings from upstream-check candidates, then decide whether any durable upstream fix belongs in an artifact instance, one reusable skill, a multi-skill boundary, a higher governance layer, or a runtime/platform constraint. Keep immediate local repair and durable upstream repair distinct, and route the next implementation step accordingly."
