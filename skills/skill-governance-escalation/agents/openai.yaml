interface:
  display_name: "Skill Governance Escalation"
  short_description: "Evidence-based escalation judge for concrete issues: keep them local, remember them as reusable candidates, or promote them to durable upstream repair."
  default_prompt: "Use $skill-governance-escalation when a concrete issue is real but the durable repair layer is still uncertain. Start by auto-auditing the current evidence or changed artifacts and produce findings before any escalation. Then make the escalation verdict explicit as local-only, provisional candidate, or promote now. Keep immediate local repair distinct from any durable upstream repair, and treat the governance report as the container for that verdict rather than the skill's identity. When the status is provisional candidate or promote now, emit or update durable governance-note guidance under the resolved agent-state location; when the status is local-only, do not create durable note noise. After the verdict is clear, decide whether any durable upstream fix belongs in an artifact instance, one reusable skill, a multi-skill boundary, a higher governance layer, or a runtime/platform constraint."
