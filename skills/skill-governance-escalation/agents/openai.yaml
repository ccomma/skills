interface:
  display_name: "Skill Governance Escalation"
  short_description: "Auto-audit a concrete issue first, classify it as local-only, provisional candidate, or promote-now, then escalate only when durable upstream repair is warranted."
  default_prompt: "Use $skill-governance-escalation when a concrete issue should trigger an explicit governance review. Start with an auto-audit of the current evidence or changed artifacts, produce findings before escalation, classify the issue as local-only, provisional candidate, or promote now, and keep immediate local repair distinct from any durable upstream repair. When the status is provisional candidate or promote now, emit or update durable governance-note guidance under the resolved agent-state location; when the status is local-only, do not create durable note noise. Then decide whether any durable upstream fix belongs in an artifact instance, one reusable skill, a multi-skill boundary, a higher governance layer, or a runtime/platform constraint."
